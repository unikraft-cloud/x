# https://taskfile.dev
version: 3

includes:
  go:
    taskfile: ./Taskfile.go.yml

tasks:
  forone:
    requires: { vars: [module, gotask] }
    # NOTE: this is a hack to work around the fact that go-task doesn't
    # allow passing the 'dir' setting to child tasks:
    # https://github.com/go-task/task/issues/585
    cmd: task -d {{.module}} -t Taskfile.go.yml -s {{.gotask}}

  forall:
    requires: { vars: [gotask] }
    vars:
      modules:
        # List workspace modules, excluding the root module (which exists
        # only to host go.mod replace directives for tools).
        sh: go list -m -f '{{`{{if ne .Path "unikraft.com/x"}}{{.Dir}}{{end}}`}}' | grep -v '^$'
    cmds:
    - for: { var: modules }
      task: forone
      vars:
        module: '{{.ITEM}}'
        gotask: '{{.gotask}}'

  protoc-gen-go-gin:
  - task: go:build
    vars:
      go_module: unikraft.com/x/tools/protoc-gen-go-gin
      package: ./tools/protoc-gen-go-gin

  protoc-gen-go-struct:
  - task: go:build
    vars:
      go_module: unikraft.com/x/tools/protoc-gen-go-struct
      package: ./tools/protoc-gen-go-struct

  imgtool:
  - task: go:build
    vars:
      go_module: unikraft.com/x/tools/imgtool
      package: ./tools/imgtool

  license-check:
  - task: go:build
    vars:
      go_module: unikraft.com/x/tools/license-check
      package: ./tools/license-check

  tools:
  - task: protoc-gen-go-gin
  - task: protoc-gen-go-struct
  - task: imgtool
  - task: license-check

  # ci tasks

  ci/check:
  - task: forall
    vars: { gotask: static-check }

  ci/test:
  - task: forall
    vars: { gotask: test }

  ci/build:
  - task: tools
