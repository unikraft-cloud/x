syntax = "proto3";

package com.unikraft.tools.protoc_gen_go_struct;

import "google/protobuf/descriptor.proto";

option go_package = "unikraft.com/x/tools/protoc-gen-go-struct/flag";

extend google.protobuf.FieldOptions {
  // flag_name specifies the command-line flag name(s) for this field.
  // Multiple names can be separated by commas (e.g., "--workspace,-w").
  optional string flag_name = 50100;

  // flag_default specifies the default value for the command-line flag.
  optional string flag_default = 50101;
}
