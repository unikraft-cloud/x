name: check-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [prod-staging]

  workflow_call:

jobs:
  check-pr:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Run check-pr
      uses: ./.github/actions/check-pr
