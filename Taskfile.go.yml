# https://taskfile.dev
version: 3

vars:
  # go vars
  go_bin:
    ref: .go_bin | default "go"
  go_tags:
    ref: .go_tags | default ""
  go_debug:
    # allow setting go_debug via debug=true on cli (which is parsed as a string
    # and when setting go_debug in the including taskfile (which passes a bool)
    ref: .go_debug | default (eq "true" (printf "%v" .debug))

  # tool vars
  goreleaser_version:
    ref: .goreleaser_version | default "latest"
  goreleaser_bin: "{{.go_bin}} run github.com/goreleaser/goreleaser/v2@{{.goreleaser_version}}"

  buf_version:
    ref: .buf_version | default "latest"
  buf_bin: "{{.go_bin}} run github.com/bufbuild/buf/cmd/buf@{{.buf_version}}"

  golangci_version:
    ref: .golangci_version | default "latest"
  golangci_bin: "{{.go_bin}} run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.golangci_version}}"

  gotestsum_version:
    ref: .gotestsum_version | default "latest"
  gotestsum_bin: "{{.go_bin}} run gotest.tools/gotestsum@{{.gotestsum_version}}"

tasks:
  generate:
    desc: "Run go generate"
    requires:
      vars:
      - package
    cmd: >-
      {{.go_bin}} generate {{.package}}

  buf: >-
    {{.buf_bin}} generate --clean

  build:
    desc: "Run go build"
    # deps:
    # - generate
    requires:
      vars:
      - go_module
      - package
    vars:
      bin:
        # when bin is unset, use the last part of the package path
        ref: .bin | default (regexFind "[^/.]+$" .package)

      # version vars
      git_tag:
        sh: git update-index -q --refresh && git describe --abbrev=0 --tags --dirty || printf "0.0.0"
      git_sha:
        sh: git update-index -q --refresh && git rev-parse HEAD

      go_gcflags: >-
        {{- ternary "-N -l" "" .go_debug }}
      go_ldflags_extra:
        ref: .go_ldflags_extra | default ""
      go_ldflags: >-
        {{- ternary "" "-s -w -extldflags -static-pie" .go_debug }}
        -X "{{.go_module}}/internal/version.Version={{.git_tag}}"
        -X "{{.go_module}}/internal/version.Commit={{.git_sha}}"
        -X "{{.go_module}}/internal/version.BuildTime={{now}}"
        {{.go_ldflags_extra}}
    cmd: >-
      {{.go_bin}} build -v {{.CLI_ARGS}}
      -buildmode=pie
      -gcflags=all='{{.go_gcflags}}'
      -ldflags='{{.go_ldflags}}'
      -tags='{{.go_tags}}'
      -o './dist/{{.bin}}'
      {{.package}}

  snapshot:
    desc: "Run goreleaser with --snapshot"
    preconditions:
    - test -f .goreleaser.yaml
    cmds:
    - "env DEB_PRERELEASE= DEB_METADATA= DEB_RELEASE= envsubst < .goreleaser.yaml > .goreleaser.yaml.snapshot"
    - "{{.goreleaser_bin}} release --config .goreleaser.yaml.snapshot --clean --snapshot"

  test:
    desc: "Run gotestsum"
    requires:
      vars:
      - package
    vars:
      package:
        ref: .package | default "./..."
    cmd: >-
      {{.gotestsum_bin}} --format=testname {{.gotestsum_args}} -- -tags='{{.go_tags}}' {{.CLI_ARGS}} {{.package}}

  tidy?:
    desc: "Check go.mod"
    cmds:
    - "{{.go_bin}} mod tidy -diff"

  tidy:
    desc: "Run go mod tidy"
    cmd: >-
      {{.go_bin}} mod tidy

  # XXX(robertgzr): figure out a solution for workspaces
  # https://github.com/golangci/golangci-lint/issues/2654#issuecomment-1606439587
  lint:
    desc: "Run golangci-lint"
    requires:
      vars:
      - package
    vars:
      disable_auto:
      - containedctx
      - cyclop
      - exhaustive
      - exhaustruct
      - funlen
      - gocognit
      - godox
      - nestif
      - perfsprint
      - prealloc
      - staticcheck
      - tagalign
      - varnamelen
      - wrapcheck
      - wsl
      disable:
        ref: ternary (.disable | default .disable_auto) "" (not .disable)
      package:
        ref: .package | default "./..."
    cmd: >-
      {{.golangci_bin}} run
      --build-tags='{{.go_tags}}'
      --timeout=10m
      --show-stats=false
      --output.text.path=stderr
      {{ with join "," .disable }}
      --disable='{{.}}'
      {{ end }}
      {{.golangci_args}}
      {{.CLI_ARGS}}
      {{.package}}

  fmt:
    desc: "Run gofumpt"
    cmd: >-
      {{.golangci_bin}} fmt
      --no-config
      --enable=gofumpt
      --diff-colored
      {{.golangci_args}}
      {{.CLI_ARGS}}

  static-check:
    desc: "Run static checks: tidy?, fmt, lint"
    cmds:
    - task: tidy?
    - task: fmt
    - task: lint

  license-check:
    desc: "Check that every go file begins with an SPDX-License-Identifier"
    cmds:
      - |
        missing=$(grep -rL '^// SPDX-License-Identifier:' . --include="*.go" --exclude="*.pb.go" --exclude-dir=.git --exclude-from=.gitignore --exclude=Taskfile.yml)
        if [ -n "$missing" ]; then
          echo "Files missing SPDX-License-Identifier header:"
          echo "$missing"
          exit 1
        else
          echo "All files have SPDX-License-Identifier header."
        fi

  # ci steps

  ci/check:
    desc: "Tasks for CI check job: license-check, static-check"
    cmds:
    - task: license-check
    - task: static-check
      vars:
        golangci_args: --output.junit-xml.path=lint-results.xml

  ci/test:
    desc: "Tasks for CI test job: test"
    cmds:
    - task: test
      vars:
        gotestsum_args: --format=testname --junitfile=test-results.xml

  ci/build:
    desc: "Tasks for CI build job: snapshot"
    cmds:
    - task: snapshot
