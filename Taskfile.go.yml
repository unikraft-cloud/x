# https://taskfile.dev
version: 3

vars:
  # go vars
  go_bin:
    ref: .go_bin | default "go"
  go_tags:
    ref: .go_tags | default ""
  go_debug:
    # allow setting go_debug via debug=true on cli (which is parsed as a string
    # and when setting go_debug in the including taskfile (which passes a bool)
    ref: .go_debug | default (eq "true" (printf "%v" .debug))

  # tool vars
  goreleaser_version:
    ref: .goreleaser_version | default "latest"
  goreleaser_bin: "{{.go_bin}} run github.com/goreleaser/goreleaser/v2@{{.goreleaser_version}}"

  buf_version:
    ref: .buf_version | default "latest"
  buf_bin: "{{.go_bin}} run github.com/bufbuild/buf/cmd/buf@{{.buf_version}}"

  golangci_version:
    ref: .golangci_version | default "latest"
  golangci_bin: "{{.go_bin}} run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.golangci_version}}"

  gotestsum_version:
    ref: .gotestsum_version | default "latest"
  gotestsum_bin: "{{.go_bin}} run gotest.tools/gotestsum@{{.gotestsum_version}}"

  golangci_config: |
    version: "2"
    run:
      issues-exit-code: 2
      build-tags:
        - integration
    linters:
      default: none
      enable:
        - staticcheck
        - errcheck
        - govet
        - modernize
        - unparam
        - ineffassign
        - unused
        - misspell
        - godox
        - testifylint
        - nolintlint
      exclusions:
        generated: lax
        presets:
        - comments
        - common-false-positives
        - legacy
        - std-error-handling
        paths:
        - tmp/
        - dist/
        - examples$
      settings:
        staticcheck:
          checks:
          # default
          - "all"
          - "-ST1000"
          - "-ST1003"
          - "-ST1016"
          - "-ST1020"
          - "-ST1021"
          - "-ST1022"
          # kong uses duplicate struct tags
          - "-SA5008" # invalid struct tag
        godox:
          keywords:
            - XXX
        nolintlint:
          require-explanation: true
          require-specific: true
    formatters:
      enable:
      - gofumpt
      exclusions:
        generated: lax
        paths:
        - tmp/
        - dist/
        - examples$

tasks:
  generate:
    desc: "Run go generate"
    requires:
      vars:
      - package
    cmd: >-
      {{.go_bin}} generate {{.package}}

  buf: >-
    {{.buf_bin}} generate --clean

  build:
    desc: "Run go build"
    # deps:
    # - generate
    requires:
      vars:
      - go_module
      - package
    vars:
      bin:
        # when bin is unset, use the last part of the package path
        ref: .bin | default (regexFind "[^/.]+$" .package)

      # version vars
      git_tag:
        sh: git update-index -q --refresh && git describe --abbrev=0 --tags --dirty || printf "0.0.0"
      git_sha:
        sh: git update-index -q --refresh && git rev-parse HEAD

      go_gcflags: >-
        {{- ternary "-N -l" "" .go_debug }}
      go_ldflags_extra:
        ref: .go_ldflags_extra | default ""
      go_ldflags: >-
        {{- ternary "" "-s -w -extldflags -static-pie" .go_debug }}
        -X "{{.go_module}}/internal/version.Version={{.git_tag}}"
        -X "{{.go_module}}/internal/version.Commit={{.git_sha}}"
        -X "{{.go_module}}/internal/version.BuildTime={{now}}"
        {{.go_ldflags_extra}}
    cmd: >-
      {{.go_bin}} build -v {{.CLI_ARGS}}
      -buildmode=pie
      -gcflags=all='{{.go_gcflags}}'
      -ldflags='{{.go_ldflags}}'
      -tags='{{.go_tags}}'
      -o './dist/{{.bin}}'
      {{.package}}

  snapshot:
    desc: "Run goreleaser with --snapshot"
    preconditions:
    - test -f .goreleaser.yaml
    cmds:
    - "env DEB_PRERELEASE= DEB_METADATA= DEB_RELEASE= envsubst < .goreleaser.yaml > .goreleaser.yaml.snapshot"
    - "{{.goreleaser_bin}} release --config .goreleaser.yaml.snapshot --clean --snapshot"

  test:
    desc: "Run gotestsum"
    requires:
      vars:
      - package
    vars:
      package:
        ref: .package | default "./..."
    cmd: >-
      {{.gotestsum_bin}} --format=testname {{.gotestsum_args}} -- -tags='{{.go_tags}}' {{.CLI_ARGS}} {{.package}}

  tidy?:
    desc: "Check go.mod"
    cmds:
    - "{{.go_bin}} mod tidy -diff"

  tidy:
    desc: "Run go mod tidy"
    cmd: >-
      {{.go_bin}} mod tidy

  # XXX(robertgzr): figure out a solution for workspaces
  # https://github.com/golangci/golangci-lint/issues/2654#issuecomment-1606439587
  lint:
    desc: "Run golangci-lint"
    requires:
      vars:
      - package
    vars:
      package:
        ref: .package | default "./..."
    env:
      GOLANGCI_CONFIG: "{{.golangci_config}}"
    cmd: |
      config_flag=""
      if [ -f .golangci.yml ] || [ -f .golangci.yaml ] || \
         [ -f .golangci.toml ] || [ -f .golangci.json ]; then
        : # use the module's own config (golangci-lint auto-discovers it)
      else
        config_dir="$(mktemp -d)"
        trap 'rm -rf "${config_dir}"' EXIT
        config="${config_dir}/golangci.yml"
        printf '%s\n' "${GOLANGCI_CONFIG}" > "${config}"
        config_flag="--config ${config}"
      fi
      {{.golangci_bin}} run \
        ${config_flag} \
        --build-tags='{{.go_tags}}' \
        --timeout=10m \
        --show-stats=false \
        --output.text.path=stderr \
        {{.golangci_args}} \
        {{.CLI_ARGS}} \
        {{.package}}

  fmt:
    desc: "Run gofumpt"
    cmd: >-
      {{.golangci_bin}} fmt
      --no-config
      --enable=gofumpt
      --diff-colored
      {{.golangci_args}}
      {{.CLI_ARGS}}

  license:
    desc: "Check that every source file contains the required license fragment"
    vars:
      paths:
        ref: .paths | default "."
      include:
        ref: .include | default "*.go"
      exclude:
        ref: .exclude | default "*.pb.go,*.gen.go"
    cmd: >-
      {{.go_bin}} run unikraft.com/x/tools/license-check@prod-staging
      {{ with .include }}--include='{{.}}'{{ end }}
      {{ with .exclude }}--exclude='{{.}}'{{ end }}
      {{.license_check_args}}
      {{.CLI_ARGS}}
      {{.paths}}

  static-check:
    desc: "Run static checks: tidy?, fmt, lint"
    cmds:
    - task: tidy?
    - task: fmt
    - task: lint
    - task: license

  # ci steps

  ci/check:
    desc: "Tasks for CI check job: static-check"
    cmds:
    - task: static-check
      vars:
        golangci_args: --output.junit-xml.path=lint-results.xml

  ci/test:
    desc: "Tasks for CI test job: test"
    cmds:
    - task: test
      vars:
        gotestsum_args: --format=testname --junitfile=test-results.xml

  ci/build:
    desc: "Tasks for CI build job: snapshot"
    cmds:
    - task: snapshot
